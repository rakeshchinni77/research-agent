version: "3.8"

services:

  app:
    build: .
    container_name: research-agent-app
    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      redis:
        condition: service_healthy

    command: bash -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


  redis:
    image: redis:alpine
    container_name: research-agent-redis
    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5